# Replace the app name and deploy from the repository root:
# fly launch --no-deploy --copy-config --config deploy/hosted/fly.toml
# fly secrets set RH_RPC_URL=... ALLOWED_ORIGINS=... ALLOWED_HOSTS=... --app YOUR_APP
app = "replace-with-stockpair-indexer"
primary_region = "iad"
kill_signal = "SIGTERM"
kill_timeout = "30s"

[build]
  dockerfile = "deploy/indexer/Dockerfile"

[env]
  NODE_ENV = "production"
  HOST = "0.0.0.0"
  PORT = "8787"
  PRODUCTION_TRADING_ENABLED = "false"
  SCOUT_ENABLED = "true"
  ALERT_DELIVERY_ENABLED = "false"

[http_service]
  internal_port = 8787
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    soft_limit = 100
    hard_limit = 150

  [[http_service.checks]]
    grace_period = "15s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/health"
